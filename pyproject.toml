[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "patron"
version = "1.0.1"
description = "Telegram Agentic AI bot"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain~=1.2.11",
    "pymongo~=4.16.0",
    "python-telegram-bot[job-queue]~=22.5",
    "python-dotenv~=1.2",
    "pytest",
    "pytest-asyncio",
    "flake8",
    "injector~=0.24",
    "requests",
    "langchain-google-genai",
]

[tool.setuptools.packages.find]
where = ["."]
